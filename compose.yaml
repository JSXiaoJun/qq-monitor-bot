services:
  napcat-config:
    image: mlikiowa/napcat-docker:latest
    container_name: qq-monitor-napcat-config
    restart: 'no'
    entrypoint: /bin/sh
    command:
      - -c
      - |
        if [ -n "$$ACCOUNT" ]; then
          cp /app/templates/ws.json "/config/onebot11_$${ACCOUNT}.json"
        fi
    environment:
      ACCOUNT: '${NAPCAT_ACCOUNT:-}'
    volumes:
      - ./data/napcat/config:/config

  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: qq-monitor-napcat
    restart: unless-stopped
    depends_on:
      napcat-config:
        condition: service_completed_successfully
    environment:
      NAPCAT_UID: '${NAPCAT_UID:-0}'
      NAPCAT_GID: '${NAPCAT_GID:-0}'
      ACCOUNT: '${NAPCAT_ACCOUNT:-}'
      MODE: ws
    ports:
      - '127.0.0.1:6099:6099'
    volumes:
      - ./data/napcat/config:/app/napcat/config
      - ./data/napcat/qq:/app/.config/QQ
      - ./data/napcat/plugins:/app/napcat/plugins
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

  monitor-bot:
    build: .
    container_name: qq-monitor-bot
    restart: unless-stopped
    depends_on:
      - napcat
    environment:
      ONEBOT_WS_URL: ws://napcat:3001
      ONEBOT_ACCESS_TOKEN: '${ONEBOT_ACCESS_TOKEN:-}'
      COMMAND: '${COMMAND:-查监控}'
      BALANCE_COMMAND: '${BALANCE_COMMAND:-查余额}'
      BALANCE_API_URL: '${BALANCE_API_URL:-http://upstream-ratio-watch:8000/api/bot/balances}'
      RATIO_COMMAND: '${RATIO_COMMAND:-查倍率}'
      RATIO_API_URL: '${RATIO_API_URL:-http://upstream-ratio-watch:8000/api/bot/ratios}'
      PROFIT_COMMAND: '${PROFIT_COMMAND:-查利润}'
      RECHARGE_COMMAND: '${RECHARGE_COMMAND:-查充值}'
      USAGE_API_URL: '${USAGE_API_URL:-http://upstream-ratio-watch:8000/api/bot/usages/today}'
      NEWAPI_BASE_URL: '${NEWAPI_BASE_URL:-}'
      NEWAPI_ACCESS_TOKEN: '${NEWAPI_ACCESS_TOKEN:-}'
      NEWAPI_USER_ID: '${NEWAPI_USER_ID:-}'
      NEWAPI_QUOTA_PER_UNIT: '${NEWAPI_QUOTA_PER_UNIT:-500000}'
      PROFIT_TIMEZONE: '${PROFIT_TIMEZONE:-Asia/Shanghai}'
      QUERY_GROUP_ID: '${QUERY_GROUP_ID:-}'
      NOTIFY_GROUP_ID: '${NOTIFY_GROUP_ID:-}'
      NOTIFY_API_TOKEN: '${NOTIFY_API_TOKEN:-}'
      NOTIFY_HOST: 0.0.0.0
      NOTIFY_PORT: 3100
      SCREENSHOT_DELAY_MS: '${SCREENSHOT_DELAY_MS:-3000}'
      SCREENSHOT_FULL_PAGE: '${SCREENSHOT_FULL_PAGE:-false}'
      VIEWPORT_WIDTH: '${VIEWPORT_WIDTH:-1440}'
      VIEWPORT_HEIGHT: '${VIEWPORT_HEIGHT:-900}'
      TZ: Asia/Shanghai
    expose:
      - '3100'
    networks:
      - default
      - qq-notify
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'

networks:
  qq-notify:
    external: true
    name: qq-notify
